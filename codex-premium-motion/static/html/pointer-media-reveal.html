<section class="pointer-media-reveal" data-pointer-media-reveal>
  <div class="pointer-media-reveal__inner">
    <div class="pointer-media-reveal__list" data-list></div>
    <div class="pointer-media-reveal__stage" data-stage>
      <img class="pointer-media-reveal__background" data-background alt="" />
      <div class="pointer-media-reveal__focus-shell" data-focus-shell>
        <img class="pointer-media-reveal__focus" data-focus alt="" />
      </div>
      <div class="pointer-media-reveal__footer">
        <div class="pointer-media-reveal__eyebrow" data-active-eyebrow></div>
        <div class="pointer-media-reveal__title" data-active-title></div>
        <p class="pointer-media-reveal__body">Use this pattern when one visual should react to pointer intent without committing the page to a full immersive stage.</p>
      </div>
    </div>
  </div>
</section>
